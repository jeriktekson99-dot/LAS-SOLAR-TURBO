<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Circle Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2BE2" />
      <stop offset="100%" stop-color="#4B0082" />
    </linearGradient>
    
    <!-- Solar Core Glow -->
    <linearGradient id="solarGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4500" />
      <stop offset="50%" stop-color="#FFA500" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>
    
    <!-- White Turbo Gloss -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- High-contrast rounded background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Solar Corona/Rays -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#solarGrad)" stroke-width="12" stroke-dasharray="10 15" stroke-linecap="round" opacity="0.8">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 256 256" 
      to="360 256 256" 
      dur="30s" 
      repeatCount="indefinite" />
  </circle>

  <!-- Turbo Bolt & Sun Core -->
  <g transform="translate(136, 116)">
    <!-- Main Sun Core -->
    <path d="M120 20 C180 20, 220 60, 220 120 C220 180, 180 220, 120 220 C60 220, 20 180, 20 120 C20 60, 60 20, 120 20 Z" fill="url(#solarGrad)" />

    <!-- Turbo Energy Bolt Lightning Cutaway -->
    <polygon points="130,30 50,150 110,150 90,250 190,110 125,110" fill="#FFFFFF" filter="drop-shadow(0px 4px 12px rgba(255, 69, 0, 0.5))" />
  </g>

  <!-- Top-left beautiful light-gloss overlay line -->
  <path d="M 40 128 C 120 40, 392 40, 472 128 C 412 80, 100 80, 40 128 Z" fill="url(#glossGrad)" />
</svg>
